[GLOBAL]
pants_version = "2.31.0"
plugins = [
  "pants-backend-clojure==0.2.1",
]
backend_packages = [
  "pants.backend.experimental.java",
  "pants_backend_clojure",
]
# Exclude samples, docs examples, and embedded templates from Pants for now.
# These can be added later once the core modules are working.
pants_ignore = [
  "samples/",
  "docs/",
  "embedded/resources/io/pedestal/embedded/",
  "build/",
  "codox-resources/",
  "cve-check-resources/",
  # Ensure .clj-kondo/ is NOT ignored (Pants ignores dot-dirs by default).
  # Needed for clj-kondo config and hook files in the lint sandbox.
  "!/.clj-kondo/",
  # The .gitignore pattern *.log matches the directory name pedestal.log/ in
  # clj-kondo export paths (e.g., log/resources/clj-kondo.exports/io.pedestal/pedestal.log/).
  # Un-ignore it so Pants can see these resource files.
  "!**/pedestal.log/",
]

[coursier]
repos = [
  "https://repo.clojars.org/",
  "https://maven-central.storage-download.googleapis.com/maven2",
  "https://repo1.maven.org/maven2",
]
# Pinned for Coursier transitive dependency bug fix
version = "v2.1.25-M19"
known_versions = [
  "v2.1.25-M19|macos_x86_64|86298db922051950acac686988b42ab7756359befe24f315ee72124c2b12b3c3|82018352",
  "v2.1.25-M19|macos_arm64|7e5fc9510fa08c3f98eb36c5801e4d7605e3f4d3d6bc43fdcd47658dd56bb316|27061694|https://github.com/coursier/coursier/releases/download/v2.1.25-M19/cs-aarch64-apple-darwin.gz",
  "v2.1.25-M19|linux_x86_64|13fc9bc82f2e4a38a60cf801ff9399c398644c7e5e4b8cf5116ef80aa4691312|28365130",
  "v2.1.25-M19|linux_arm64|a7bbad42163c4fde4cb1191ccfd11261c21873023c495ba7494ca109de4da761|85679032|https://github.com/coursier/coursier/releases/download/v2.1.25-M19/cs-aarch64-pc-linux.gz",
]

[source]
# Pedestal's module layout: each module has src/, some have java/, resources/
# Tests are in tests/test/ and tests/dev/
# Note: "resources" pattern is intentionally NOT included because it would also match
# service/src/io/pedestal/service/resources/ which is a Clojure namespace, not a resource root.
# Instead, we use anchored patterns for the specific resource directories.
root_patterns = [
  "src",
  "java",
  "test",
  "dev",
  "bench",
  "/embedded/resources",
  "/error/resources",
  "/interceptor/resources",
  "/log/resources",
  "/route/resources",
  "/tests/resources",
  # Needed for tests/file-root/ test data files - stripping "tests/" prefix
  # so they appear as "file-root/..." in the sandbox (matching test expectations).
  "/tests",
]

[jvm]
default_resolve = "pedestal"
jdk = "corretto:17"
global_options = [
  "-Djdk.attach.allowAttachSelf",
  "-Dclojure.core.async.go-checking=true",
]

[jvm.resolves]
pedestal = "locks/jvm/pedestal.lock.jsonc"

[clj-kondo]
version = "2026.01.19"

[cljfmt]
version = "0.16.2"

[nrepl]
version = "1.4.0"

[anonymous-telemetry]
enabled = false
